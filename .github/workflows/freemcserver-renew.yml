name: FreeMCServer-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '27 */2 * * *'   # 每2小时自动运行

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    # 权限设置：必须允许写入权限才能执行删除旧记录的操作
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/FreeMCServer-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/renew.py renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          # 获取 IP 后通过 sed 隐藏后两位段
          RAW_IP=$(curl -s -x http://127.0.0.1:8080 https://api.ipify.org)
          MASKED_IP=$(echo $RAW_IP | sed 's/\.[0-9]\+\.[0-9]\+$/.*.*/')
          echo "🌐 当前代理出口 IP: $MASKED_IP"

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          FMCS_ACCOUNT: ${{ secrets.FMCS_ACCOUNT }}
          FMCS_SERVER_ID: ${{ secrets.FMCS_SERVER_ID }}
          TG_BOT: ${{ secrets.TG_BOT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: "*.png"
          retention-days: 1 # 既然只留3次记录，截图保留1天足矣

      # ================= 🧹 核心：清理运行记录 =================
      - name: 🗑️ 清理旧的运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0             # 不按天数保留
          keep_minimum_runs: 3       # 严格保留最近的 3 次记录
